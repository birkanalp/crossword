name: EAS Build & Submit

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install deps
        run: cd mobile && npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Build (Preview on PR)
        if: github.event_name == 'pull_request'
        run: cd mobile && eas build --profile preview --platform all --non-interactive

      - name: EAS Build + Submit (Production on master push)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: cd mobile && eas build --profile production --platform all --non-interactive --auto-submit
